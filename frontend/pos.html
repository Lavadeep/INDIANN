<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POS Annotation — IndiAnn</title>
  <link rel="stylesheet" href="css/common.css">
  <script src="js/config.js"></script>
  <script src="js/header.js"></script>
  <style>
    .container {
      display: flex;
      padding: 20px;
      gap: 30px;
    }

    .text-box {
      flex: 3;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 12px;
      max-height: 500px;
      overflow-y: auto;
      background: var(--color-surface);
    }

    .sentence {
      border-bottom: 1px solid #ddd;
      padding: 5px;
    }

    .sentence:nth-child(odd) {
      background: var(--color-bg);
    }

    .sidebar {
      flex: 1;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      padding: 15px;
      border-radius: var(--radius);
    }

    .dropdown {
      padding: 10px 12px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 220px;
    }

    /* Label colors (dynamic, computed in JS) */
    .highlight.labelled {
      background: var(--label-bg, #fff7b2);
    }
    /* ---- Curation States ---- */
    .highlight.pending {
      outline: 2px dashed #dbd679;
    }

    .highlight.conflict {
      background: #fff3cd;   /* amber */
      outline: 2px solid #f0ad4e;
    }

    .highlight.approved {
      background: #d4edda;   /* green */
      outline: 2px solid #28a745;
    }

    .highlight.rejected {
      background: #c6c5c5;   /* red */
      text-decoration: line-through;
    }


    .highlight {
      border-radius: 4px;
      padding: 2px 4px;
      margin: 0 1px;
    }

    /* Legend */
    .legend {
      width: 220px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      background: #fafafa;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
    }

    .color-box {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      margin-right: 8px;
    }
  </style>

<script>
  const API = window.APP_CONFIG.API_BASE_URL;
  const textBox = document.getElementById("textBox");
  const posType = document.getElementById("posType");

  const urlParams = new URLSearchParams(window.location.search);
  const documentId = urlParams.get("document_id");
  const projectId = urlParams.get("project_id");
  const MODE = urlParams.get("mode") || "annotate";

  const modePill = document.getElementById("modePill");
  if (modePill) {
    modePill.textContent = MODE === "curate" ? "Curate" : "Annotate";
    modePill.className = "mode-pill " + (MODE === "curate" ? "curate" : "annotate");
  }

  const banner = document.getElementById("modeBanner");
  if (MODE === "curate") {
    if (banner) { banner.textContent = "CURATION MODE"; banner.style.background = "#fef3c7"; }
  } else {
    if (banner) { banner.style.display = "none"; }
  }
  if (MODE === "curate") {

    // Hide annotation-only UI
    document.getElementById("posHeader")?.style.setProperty("display", "none");
    document.getElementById("posType")?.style.setProperty("display", "none");
    document.getElementById("posLegend")?.style.setProperty("display", "none");
    document.getElementById("toggleDepEditor")?.style.setProperty("display", "none");
    document.getElementById("downloadBtn")?.style.setProperty("display", "none");
    document.getElementById("downloadConlluBtn")?.style.setProperty("display", "none");

  }


  const user = JSON.parse(localStorage.getItem("user"));
  if (!user || !user.user_id) {
    window.location.href = "login.html";
  }
  var headerUserEl = document.getElementById("headerUsername");
  if (headerUserEl) headerUserEl.textContent = user?.username || "User";

  var backLink = document.getElementById("headerBackToProject");
  if (backLink && projectId) backLink.href = "project.html?project_id=" + projectId + "&mode=" + MODE;
  document.getElementById("headerLogoutBtn")?.addEventListener("click", function () {
    localStorage.removeItem("user");
    window.location.href = "login.html";
  });

  const AUTH_HEADERS = {
    "X-User-Id": String(user.user_id)
  };

  // --- Application State ---
  let originalContent = ''; // Store the raw, unmodified document text
  let annotations = [];     // Store the list of all annotations for this document
  let selectedAnnotation = null; // Currently selected annotation for inspection/deletion
  let curationData = null;   // used only in curate mode
  let selectedGroup = null; // Currently selected group for curation
  let CURRENT_GROUP = null;
  let CURRENT_BY_LABEL = {};
  let canEditAnnotations = true;  // false after annotator clicks "Mark as done"
  let posEntityLabels = [];  // { label_name, description } for label info popup
  let LABEL_COLOR_BY_NAME = {}; // label_name -> css color

  function hashStringToHue(str) {
    const s = String(str || "");
    let h = 5381;
    for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
    return Math.abs(h) % 360;
  }

  function pastelByIndex(i, n) {
    const safeN = Math.max(1, n || 1);
    const hue = ((i % safeN) * (360 / safeN) + 20) % 360;
    return `hsl(${hue} 70% 88%)`;
  }

  function buildLabelColorMap() {
    const names = (posEntityLabels || [])
      .map(l => l?.label_name)
      .filter(Boolean);
    LABEL_COLOR_BY_NAME = {};
    names.forEach((name, idx) => {
      LABEL_COLOR_BY_NAME[name] = pastelByIndex(idx, names.length);
    });
  }

  function getLabelColor(labelName) {
    const key = String(labelName || "");
    if (LABEL_COLOR_BY_NAME && LABEL_COLOR_BY_NAME[key]) return LABEL_COLOR_BY_NAME[key];
    const hue = hashStringToHue(key);
    return `hsl(${hue} 65% 88%)`;
  }



  /**
   * Computes sentences from originalContent: use newline split when content is
   * already sentence-segmented; else split by sentence-ending punctuation.
   * Supports English (.!?) and Indic (। U+0964, ॥ U+0965) so Telugu/Hindi/Odia/Bengali render sentence-by-sentence.
   */
  function computeSentences() {
    if (!originalContent || typeof originalContent !== "string") return [];
    const lines = originalContent.split("\n");
    if (lines.length > 1) {
      const sentences = [];
      let pos = 0;
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const start = pos;
        const end = pos + line.length;
        sentences.push({ start, end, text: line });
        pos = end + (i < lines.length - 1 ? 1 : 0);
      }
      return sentences;
    }
    const content = originalContent;
    const sentences = [];
    let pos = 0;
    while (pos < content.length) {
      while (pos < content.length && /\s/.test(content[pos])) pos++;
      if (pos >= content.length) break;
      const start = pos;
      const rest = content.slice(pos);
      const match = rest.match(/\S[\s\S]*?[.?!\u0964\u0965]+/);
      if (match) {
        let end = pos + match[0].length;
        while (end < content.length && /\s/.test(content[end])) end++;
        sentences.push({ start, end, text: content.slice(start, end).trim() });
        pos = end;
      } else {
        const m2 = rest.match(/\S[\s\S]*/);
        if (m2) {
          const end = pos + m2[0].length;
          sentences.push({ start, end, text: content.slice(start, end).trim() });
          pos = end;
        } else break;
      }
    }
    return sentences;
  }

  /**
   * Renders the document content with all current annotations.
   * In curate mode: one highlight per (start, end) span (like spanrel). On click, curator sees by-label breakdown.
   */
  function renderContentWithAnnotations() {
    const sentences = computeSentences();

    textBox.innerHTML = '';

    sentences.forEach(sentence => {
      const { start: sentStart, end: sentEnd, text: sentText } = sentence;

      let relevantAnnos = annotations.filter(anno =>
        anno.start_offset < sentEnd && anno.end_offset > sentStart
      );

      const localTags = [];

      if (MODE === "curate") {
        // One highlight per span: group by (start_offset, end_offset)
        const seen = new Set();
        relevantAnnos.forEach(anno => {
          const key = `${anno.start_offset}-${anno.end_offset}`;
          if (seen.has(key)) return;
          seen.add(key);
          const group = annotations.filter(a =>
            a.start_offset === anno.start_offset && a.end_offset === anno.end_offset
          );
          const hasConflict = group.some(a => a.conflict);
          const anyApproved = group.some(a => a.status === "approved");
          const anyRejected = group.some(a => a.status === "rejected");
          let cls = "highlight pending";
          if (hasConflict) cls = "highlight conflict";
          else if (anyApproved) cls = "highlight approved";
          else if (anyRejected) cls = "highlight rejected";
          localTags.push({
            pos: Math.max(0, anno.start_offset - sentStart),
            type: "start",
            start_offset: anno.start_offset,
            end_offset: anno.end_offset,
            cls
          });
          localTags.push({
            pos: Math.min(sentText.length, anno.end_offset - sentStart),
            type: "end"
          });
        });
      } else {
        relevantAnnos.forEach(anno => {
          localTags.push({
            pos: Math.max(0, anno.start_offset - sentStart),
            type: "start",
            label: anno.entity_label,
            id: anno.id,
            status: anno.status,
            conflict: anno.conflict
          });
          localTags.push({
            pos: Math.min(sentText.length, anno.end_offset - sentStart),
            type: "end"
          });
        });
      }

      localTags.sort((a, b) => a.pos - b.pos || (a.type === "end" ? -1 : 1));

      let localHtml = "";
      let lastPos = 0;
      localTags.forEach(tag => {
        localHtml += sentText.slice(lastPos, tag.pos);
        if (tag.type === "start") {
          if (MODE === "curate") {
            localHtml += `<span class="${tag.cls}" data-start-offset="${tag.start_offset}" data-end-offset="${tag.end_offset}">`;
          } else {
            let cls = "highlight pending";
            if (tag.status === "approved") cls = "highlight approved";
            if (tag.status === "rejected") cls = "highlight rejected";
            if (tag.conflict) cls = "highlight conflict";
            const bg = getLabelColor(tag.label);
            localHtml += `<span class="${cls} labelled" style="--label-bg:${bg}" data-pos="${tag.label}" data-anno-id="${tag.id}">`;
          }
        } else {
          localHtml += `</span>`;
        }
        lastPos = tag.pos;
      });
      localHtml += sentText.slice(lastPos);

      const div = document.createElement("div");
      div.className = "sentence";
      div.innerHTML = localHtml;
      textBox.appendChild(div);
    });
  }

  //-------------------//
  //Delete Annotation Logic//
  //-------------------//
  async function curateLabel(label, action, btn) {
  if (!selectedGroup || selectedGroup.start_offset === undefined) {
    alert("No annotation selected");
    return;
  }

  // 🔒 Immediate UI feedback
  if (btn) {
    const parent = btn.parentElement;
    parent.querySelectorAll("button").forEach(b => {
      b.disabled = true;
      b.style.opacity = "0.6";
    });
  }

  await fetch(`${API}/curation/entity_consensus`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-User-Id": String(user.user_id)
    },
    body: JSON.stringify({
      document_id: parseInt(documentId),
      start_offset: selectedGroup.start_offset,
      end_offset: selectedGroup.end_offset,
      label: label,
      action: action
    })
  });

  // 🔄 FORCE full refresh
  await initialize();

  // 🔁 Re-open inspector on same span (curate: one highlight per span, use offset selector)
  const span = document.querySelector(
    `.highlight[data-start-offset="${selectedGroup.start_offset}"][data-end-offset="${selectedGroup.end_offset}"]`
  );
  if (span) span.click();
}



  textBox.addEventListener("click", (e) => {
  const span = e.target.closest(".highlight");
  if (!span) return;

  let anno = null;
  if (MODE === "curate" && span.dataset.startOffset != null && span.dataset.endOffset != null) {
    const startOffset = parseInt(span.dataset.startOffset, 10);
    const endOffset = parseInt(span.dataset.endOffset, 10);
    selectedGroup = { start_offset: startOffset, end_offset: endOffset };
    const sameGroup = annotations.filter(a =>
      a.start_offset === startOffset && a.end_offset === endOffset
    );
    if (sameGroup.length === 0) return;
    anno = sameGroup[0];
    selectedAnnotation = anno;
  } else {
    const annoId = parseInt(span.dataset.annoId, 10);
    if (!annoId) return;
    anno = annotations.find(a => a.id === annoId);
    if (!anno) return;
    selectedAnnotation = anno;
    if (MODE === "curate") {
      selectedGroup = {
        start_offset: anno.start_offset,
        end_offset: anno.end_offset,
        label: anno.entity_label
      };
    }
  }

  // ==========================
  // CURATE MODE
  // ==========================
  if (MODE === "curate") {
    const sameGroup = annotations.filter(a =>
      a.start_offset === selectedGroup.start_offset &&
      a.end_offset === selectedGroup.end_offset
    );

    // ✅ ADD THIS BLOCK (FIX)
    const byLabel = {};
    sameGroup.forEach(a => {
      if (!byLabel[a.entity_label]) {
        byLabel[a.entity_label] = [];
      }
      byLabel[a.entity_label].push(a);
    });
    // ✅ END FIX

    document.getElementById("annoDetails").innerHTML = `
      <b>Text:</b> ${anno.entity_text}<br>
      <b>Span:</b> [${anno.start_offset}, ${anno.end_offset}]<br><br>

      ${Object.entries(byLabel).map(([label, anns]) => {
      const norm = s => (String(s || "").toLowerCase().trim());
      const allPending = anns.every(a => norm(a.status) === "pending");
      const allApproved = anns.every(a => norm(a.status) === "approved");
      const allRejected = anns.every(a => norm(a.status) === "rejected");

      let actionUI = "";

      if (allPending) {
        actionUI = `
          <button onclick="curateLabel('${label}', 'approved',this)">Approve</button>
          <button onclick="curateLabel('${label}', 'rejected',this)">Reject</button>
        `;
      } else if (allApproved) {
        actionUI = `<span style="color:green;">✅ Approved</span>`;
      } else if (allRejected) {
        actionUI = `<span style="color:red;">❌ Rejected</span>`;
      } else {
        actionUI = `<span style="color:#999;">⏳ Partially curated</span>`;
      }

      const userCount = anns.length;
      return `
        <div style="margin-bottom:8px;">
          👤 <b>${label}</b> — <b>${userCount} user${userCount !== 1 ? "s" : ""}</b><br>
          ${actionUI}
        </div>
      `;
    }).join("")}
    `;

    document.getElementById("approveGroup").style.display = "none";
    document.getElementById("rejectGroup").style.display = "none";
    document.getElementById("deleteAnnoBtn").style.display = "none";
  }


  // ==========================
  // ANNOTATE MODE
  // ==========================
  else {

    document.getElementById("annoDetails").innerHTML = `
      <b>Text:</b> ${anno.entity_text}<br>
      <b>Label:</b> ${anno.entity_label}<br>
      <b>Span:</b> [${anno.start_offset}, ${anno.end_offset}]<br>
      <b>Status:</b> ${anno.status}
    `;

    document.getElementById("approveGroup").style.display = "none";
    document.getElementById("rejectGroup").style.display = "none";
    document.getElementById("deleteAnnoBtn").style.display = "block";
  }

  document.getElementById("annotationInspector").style.display = "block";
});


  document.getElementById("deleteAnnoBtn").addEventListener("click", async () => {
    if (MODE === "curate") return;
    if (!canEditAnnotations) return;

    if (!selectedAnnotation) return;

    try {
      
      await fetch(
        `${API}/entity_annotations/${selectedAnnotation.id}`,
        {
          method: "DELETE",
          headers: { "X-User-Id": String(user.user_id) }
        }
      );
      

      // Remove from local state
      annotations = annotations.filter(a => a.id !== selectedAnnotation.id);

      selectedAnnotation = null;
      document.getElementById("annotationInspector").style.display = "none";

      // Re-render cleanly from originalContent
      renderContentWithAnnotations();

    } catch (err) {
      console.error("Failed to delete annotation:", err);
      alert("Delete failed");
    }
  });

  document.getElementById("markAsDoneBtn")?.addEventListener("click", async () => {
    if (MODE === "curate" || !documentId) return;
    const btn = document.getElementById("markAsDoneBtn");
    const msgEl = document.getElementById("annotationCompleteMessage");
    if (!btn || !msgEl) return;
    btn.disabled = true;
    try {
      const res = await fetch(
        `${API}/documents/${documentId}/mark-annotation-complete`,
        { method: "POST", headers: AUTH_HEADERS }
      );
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert(err.detail || "Failed to mark as complete");
        btn.disabled = false;
        return;
      }
      canEditAnnotations = false;
      msgEl.textContent = "You have marked this document as complete. You can no longer change annotations.";
      msgEl.style.color = "var(--color-text-muted)";
      btn.style.display = "none";
    } catch (err) {
      console.error(err);
      alert("Failed to mark as complete");
      btn.disabled = false;
    }
  });

  function openLabelInfoPopup() {
    const listEl = document.getElementById("labelInfoList");
    const popup = document.getElementById("labelInfoPopup");
    if (!listEl || !popup) return;

  /**
   * Main function to initialize the page.
   * Fetches the document and its existing annotations.
   */
  async function initialize() {
    if (!documentId) {
      textBox.textContent = "Error: No document ID provided in the URL.";
      return;
    }
    const projectId = urlParams.get("project_id");
    loadPOSLabels(projectId);

    try {
      // --- Fetch Document Content ---
      const docRes = await fetch(
        `${API}/documents/${documentId}`,
        { headers: AUTH_HEADERS }
      );

      if (!docRes.ok) throw new Error(`HTTP ${docRes.status}`);
      const doc = await docRes.json();
      
      originalContent = doc.content || '';
      if (!originalContent) {
          console.error("No content found in document:", doc);
          return;
      }
      
      // Keep backend sentence boundaries intact (one sentence per line for uploads).
      // Only normalize line endings across OS types.
      originalContent = originalContent.replace(/\r\n?/g, "\n");
      const titleElem = document.getElementById("docTitle");
      if (titleElem) {
        titleElem.innerText = doc.filename;
      }
      
      // --- Fetch Existing Annotations ---
      if (MODE === "curate") {
        const res = await fetch(
          `${API}/curation/document/${documentId}`,
          { headers: AUTH_HEADERS }
        );
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          const msg = typeof errBody.detail === "string" ? errBody.detail : `HTTP ${res.status}`;
          throw new Error(msg);
        }
        curationData = await res.json();
        annotations = [];

        curationData.spans.forEach(group => {
          group.annotations.forEach(a => {
            // CoNLL "_" means no label; do not show as an annotation
            if (a.label === "_" || a.label === null || a.label === undefined) return;
            annotations.push({
              id: a.annotation_id,
              entity_label: a.label,
              entity_text: a.text,
              start_offset: group.start_offset,
              end_offset: group.end_offset,
              status: a.status,
              conflict: group.conflict
            });
          });
        });

      } else {
        const annoRes = await fetch(
          `${API}/entity_annotations/${documentId}`,
          { headers: AUTH_HEADERS }
        );

        const allAnnotations = await annoRes.json();

        // ✅ FILTER: only current user's annotations; exclude "_" (CoNLL no-label)
        annotations = allAnnotations.filter(
          a => a.user_id === user.user_id && a.entity_label != null && a.entity_label !== "_"
        );

      }

      // Annotation completion status (annotate mode: show Mark as done, lock editing when done)
      if (MODE !== "curate") {
        try {
          const statusRes = await fetch(
            `${API}/documents/${documentId}/annotation-status`,
            { headers: AUTH_HEADERS }
          );
          if (statusRes.ok) {
            const statusData = await statusRes.json();
            canEditAnnotations = statusData.can_edit !== false;
            const box = document.getElementById("annotationCompleteBox");
            const msgEl = document.getElementById("annotationCompleteMessage");
            const doneBtn = document.getElementById("markAsDoneBtn");
            if (box && msgEl && doneBtn) {
              box.style.display = "block";
              if (statusData.user_has_completed || statusData.can_edit === false) {
                msgEl.textContent = "You have marked this document as complete. You can no longer change annotations.";
                msgEl.style.color = "var(--color-text-muted)";
                doneBtn.style.display = "none";
              } else {
                // Show Mark as done for any user in annotate mode (annotators + curators in annotator tab).
                msgEl.textContent = "When you finish annotating, mark as done to lock your annotations.";
                msgEl.style.color = "var(--color-text-muted)";
                doneBtn.style.display = "block";
              }
            }
          }
        } catch (e) {
          console.warn("Could not load annotation status:", e);
        }
      }

      
      console.log(`Loaded ${annotations.length} existing annotations.`);
      console.log(`Computed ${computeSentences().length} sentences.`);

      // --- Render the content with highlights ---
      renderContentWithAnnotations();

    } catch (error) {
      console.error("Error initializing page:", error);
      textBox.textContent = `Failed to load document. ${error.message}`;
    }
  }

  // --- Event Listener for creating new annotations ---
  textBox.addEventListener("mouseup", () => {
    if (MODE === "curate") return;
    if (!canEditAnnotations) return;

    const selection = window.getSelection();
    const tag = posType.value;

    if (!selection.rangeCount || selection.isCollapsed || !tag) {
      return; // Nothing selected or no tag chosen
    }

    const range = selection.getRangeAt(0);

    // --- Start: Expand to full word (Your requested logic) ---
    const nodeText = range.startContainer.textContent;
    let start = range.startOffset;
    let end = range.endOffset;

    // Only expand if we're on a text node
    if (range.startContainer.nodeType === Node.TEXT_NODE) {
        // Crawl backward
        while (start > 0 && /\S/.test(nodeText[start - 1])) {
            start--;
        }
        // Crawl forward
        while (end < nodeText.length && /\S/.test(nodeText[end])) {
            end++;
        }
    }
    
    // Create a new range with the expanded offsets
    const expandedRange = document.createRange();
    expandedRange.setStart(range.startContainer, start);
    expandedRange.setEnd(range.startContainer, end);
    
    const expandedText = expandedRange.toString().trim();

    // If selection is just whitespace or empty, abort
    if (!expandedText) {
        selection.removeAllRanges();
        return;
    }
    // --- End: Expand to full word ---

    // Ensure selection is within our text box
    const sentenceDiv = range.commonAncestorContainer.parentNode.closest(".sentence");
    if (!sentenceDiv) {
      selection.removeAllRanges();
      return;
    }

    // --- Robust Offset Calculation (Now uses expanded offsets) ---
    const sentences = computeSentences();
    const sentenceIndex = Array.from(textBox.children).indexOf(sentenceDiv);
    const sentStart = sentences[sentenceIndex].start;
    
    // Create a temporary range to measure the offset from the sentence start
    const preRange = document.createRange();
    preRange.setStart(sentenceDiv.firstChild, 0); // Start from the beginning of the sentence
    preRange.setEnd(expandedRange.startContainer, expandedRange.startOffset); // End at the NEW expanded 'start'

    // .length on a stringified range gives the character count, which is our offset
    const startInSentence = preRange.toString().length;
    
    const absStart = sentStart + startInSentence;
    const absEnd = absStart + expandedText.length; // Use the length of the NEW expandedText

    // --- Save to Backend ---
    fetch(`${API}/entity_annotations/`, {
      method: "POST",
      headers: { "Content-Type": "application/json","X-User-Id": String(user.user_id) },
      body: JSON.stringify({
        document_id: parseInt(documentId),
        user_id: user.user_id,
        start_offset: absStart,
        end_offset: absEnd,
        entity_label: tag,
        entity_text: expandedText
      })
    })
    .then(res => {
      if (!res.ok) throw new Error('Failed to save annotation');
      return res.json();
    })
    .then(newAnnotation => {
      console.log("Saved annotation:", newAnnotation);
      // Add the new annotation to our state
      annotations.push(newAnnotation);
      // Re-render the entire text box with the new highlight
      renderContentWithAnnotations();
    })
    .catch(err => console.error("Error saving annotation:", err));

    selection.removeAllRanges();
  });

  document.getElementById("downloadBtn").addEventListener("click", async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const documentId = urlParams.get("document_id");
    if (!documentId) {

        if (!response.ok) {
            const err = await response.json();
            alert("Download failed: " + (err.detail || "Unknown error"));
            return;
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `document_${documentId}_pos.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
    } catch (err) {
        console.error(err);
        alert("⚠️ Failed to download POS annotations.");
    }
});

document.getElementById("downloadConlluBtn").addEventListener("click", async () => {
  const documentId = new URLSearchParams(window.location.search).get("document_id");
  if (!documentId) {
    alert("No document selected!");
    return;
  }

  try {
    // first: ask backend what type of document this is
    const docRes = await fetch(
      `${API}/documents/${documentId}`,
      { headers: { "X-User-Id": String(user.user_id) } }
    );
    const doc = await docRes.json();

    let res, blob, filename;

    if (doc.file_type === "conllu") {
      // ✅ MERGED export (plain text)
      res = await fetch(
        `${API}/export/conllu/${documentId}`,
        { headers: { "X-User-Id": String(user.user_id) } }
      );
      if (!res.ok) throw new Error("Export failed");
      blob = await res.blob();
      filename = doc.filename;
    } else {
      // ✅ GENERATED export (JSON)
      res = await fetch(
        `${API}/export/conllu/generated/${documentId}`,
        { headers: { "X-User-Id": String(user.user_id) } }
      );
      if (!res.ok) throw new Error("Export failed");
      const payload = await res.json();
      blob = new Blob([payload.conllu], { type: "text/plain;charset=utf-8" });
      filename = `document_${documentId}.conllu`;
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

  } catch (err) {
    console.error(err);
    alert("Failed to export CoNLL-U.");
  }
});

  const depEditor = document.getElementById("depEditor");

  async function loadDepEditor() {
    const documentId = new URLSearchParams(window.location.search).get("document_id");
    if (!documentId) return;
    try {
      // Get document type: native CoNLL-U vs other (use generated export)
      const docRes = await fetch(
        `${API}/documents/${documentId}`,
        { headers: { "X-User-Id": String(user.user_id) } }
      );
      if (!docRes.ok) {
        alert("Failed to load document info for dependency editor.");
        return;
      }
      const doc = await docRes.json();

      let conlluText;
      if (doc.file_type === "conllu") {
        const res = await fetch(`${API}/export/conllu/${documentId}`, {
          headers: { "X-User-Id": String(user.user_id) }
        });
        if (!res.ok) {
          alert("Failed to load CoNLL-U for dependency editor.");
          return;
        }
        conlluText = await res.text();
      } else {
        // Non-CoNLL document: use generated CoNLL-U export
        const res = await fetch(`${API}/export/conllu/generated/${documentId}`, {
          headers: { "X-User-Id": String(user.user_id) }
        });
        if (!res.ok) {
          alert("Failed to load generated CoNLL-U for dependency editor. The document may not have tokenization yet.");
          return;
        }
        const payload = await res.json();
        conlluText = payload.conllu || "";
      }
      if (!conlluText || !conlluText.trim()) {
        alert("No CoNLL-U data available for dependency editing.");
        return;
      }

      // parse conllu lines into tokens
      const lines = conlluText
        .split("\n")
        .filter(l => l && !l.startsWith("#"));

      const toks = lines.map(l => {
        const cols = l.split("\t");
        return {
          gid: parseInt(cols[0], 10),
          form: cols[1],
          head: cols[6],
          deprel: cols[7]
        };
      });

      const tbody = document.querySelector("#depTable tbody");
      tbody.innerHTML = "";

      toks.forEach(t => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${t.gid}</td>
          <td>${t.form}</td>
          <td>
            <input type="number"
                  value="${t.head}"
                  min="0"
                  style="width:80px"
                  id="head_${t.gid}">
          </td>
          <td>
            <input type="text"
                  value="${t.deprel}"
                  style="width:120px"
                  id="deprel_${t.gid}">
          </td>
          <td>
            <button data-gid="${t.gid}" class="saveDep">Save</button>
          </td>
        `;
        tbody.appendChild(tr);
      });


      document.querySelectorAll(".saveDep").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const gid = e.target.dataset.gid;
          const headVal = document.getElementById(`head_${gid}`).value;
          const relVal = document.getElementById(`deprel_${gid}`).value;
          await fetch(`${API}/dependency_annotations/`, {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "X-User-Id": String(user.user_id)
                  },
                  body: JSON.stringify({
                    document_id: parseInt(documentId),
                    token_index: parseInt(gid),
                    head_index: parseInt(headVal || 0),
                    deprel: relVal || "_"
                  })
                });

          alert("Saved");
        });
      });
    } catch (e) { console.error(e); }
  }

async function loadPOSLabels(projectId) {
  try {
    const res = await fetch(
      `${API}/projects/${projectId}/labels`,
      { headers: AUTH_HEADERS }
    );

    const labels = await res.json();

    const select = document.getElementById("posType");
    if (!select) return;

    posEntityLabels = (labels || []).filter(l => l.layer_type === "entity");
    buildLabelColorMap();

    select.innerHTML = `<option value="">-- Choose Part of Speech --</option>`;
    posEntityLabels.forEach(label => {
      const opt = document.createElement("option");
      opt.value = label.label_name;
      opt.textContent = label.label_name;
      opt.title = label.description || "";
      select.appendChild(opt);
    });

  } catch (err) {
    console.error("Failed to load POS labels", err);
  }
}

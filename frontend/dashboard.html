<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Annotation Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/common.css" />
  <script src="js/config.js"></script>
  <script src="js/header.js"></script>
  <style>
    /* TABS */
    .tabs{
      display:flex;
      gap:10px;
      margin:18px auto;
      max-width:1100px;
      padding:0 16px;
    }

    .tab{
      padding:8px 16px;
      border:none;
      border-radius:var(--radius);
      background:var(--color-border);
      font-weight:bold;
      cursor:pointer;
    }

    .tab.active{
      background:var(--color-primary);
      color:#fff;
    }

    /* CONTENT */
    .container{
      max-width:1100px;
      margin:0 auto;
      padding:0 16px;
    }

    .panel{ display:none; }
    .panel.active{ display:block; }

    /* PROJECT CARD */
    .project-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      min-height: 72px;
    }

    .project-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .project-info .name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.3;
    }

    .project-info .desc {
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .project-card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .project-card-actions .btn {
      margin: 0;
      white-space: nowrap;
    }

  </style>
</head>

<body>

  <header class="app-header" aria-label="Application header">
    <div class="app-header-left">
      <div class="header-logo" aria-hidden="true"><img src="logo.png" alt="IITBBS" /></div>
    </div>
    <div class="app-header-center">
      <a href="dashboard.html" class="app-header-title">IndiAnn</a>
    </div>
    <div class="app-header-right">
      <div class="header-profile-wrap">
        <span id="headerUsername" class="header-user-name">User</span>
        <button type="button" class="header-profile-btn" id="headerProfileBtn" aria-haspopup="true" aria-expanded="false" aria-label="Profile menu">&#128100;</button>
        <div class="header-dropdown" id="headerDropdown" role="menu">
          <a href="dashboard.html" role="menuitem">Dashboard</a>
          <div class="dropdown-divider"></div>
          <button type="button" role="menuitem" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>
  </header>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" data-panel="annotatePanel">Annotate</button>
  <button class="tab" data-panel="curatePanel">Curate</button>
  <button class="tab" data-panel="adminPanel" id="adminTab" style="display:none">Admin</button>
</div>

<div class="container">

  <!-- ANNOTATE -->
  <div id="annotatePanel" class="panel active">
    <div id="annotateList"></div>
  </div>

  <!-- CURATE -->
  <div id="curatePanel" class="panel">
    <div id="curateList"></div>
  </div>

  <!-- ADMIN -->
  <div id="adminPanel" class="panel">
    <h2>Admin Control Panel</h2>
    <button type="button" class="btn btn-primary" onclick="openCreateProject()">+ Create Project</button>
    <div id="adminProjects" style="margin-top:16px;"></div>
  </div>

</div>

<script>
const API = window.APP_CONFIG.API_BASE_URL;
const user = JSON.parse(localStorage.getItem("user"));
if(!user) location.href="login.html";

var headerUserEl = document.getElementById("headerUsername");
if (headerUserEl) headerUserEl.textContent = user.username + (user.is_admin ? " (ADMIN)" : "");

if(user.is_admin){
  document.getElementById("adminTab").style.display="inline-block";
}

/* TAB SWITCH */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.panel).classList.add("active");

    if(tab.dataset.panel==="annotatePanel") loadAnnotate();
    if(tab.dataset.panel==="curatePanel") loadCurate();
    if(tab.dataset.panel==="adminPanel") loadAdmin();
  };
});

/* LOAD ANNOTATE PROJECTS (ALL) */
async function loadAnnotate(){
  const res = await fetch(`${API}/projects/annotatable`, {
    headers:{ "X-User-Id": user.user_id }
  });
  const projects = await res.json();
  const box = document.getElementById("annotateList");
  box.innerHTML="";

  projects.forEach(p=>{
    const name = (p.project_name || "").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    const desc = (p.description || "").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    box.innerHTML += `
      <div class="project-card">
        <div class="project-info">
          <div class="name">${name}</div>
          <div class="desc">${desc}</div>
        </div>
        <div class="project-card-actions">
          <button type="button" class="btn btn-primary" onclick="openProject(${p.project_id})">Open</button>
        </div>
      </div>
    `;
  });
}

/* LOAD CURATE PROJECTS */
async function loadCurate(){
  const res = await fetch(`${API}/projects/curatable`, {
    headers:{ "X-User-Id": user.user_id }
  });
  const projects = await res.json();
  const box = document.getElementById("curateList");
  box.innerHTML="";

  if(!projects.length){
    box.innerHTML="<p>No projects assigned for curation.</p>";
    return;
  }

  projects.forEach(p=>{
    const name = (p.project_name || "").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    const desc = (p.description || "").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    box.innerHTML += `
      <div class="project-card">
        <div class="project-info">
          <div class="name">${name}</div>
          <div class="desc">${desc}</div>
        </div>
        <div class="project-card-actions">
          <button type="button" class="btn btn-primary" onclick="openCurateProject(${p.project_id})">Curate</button>
        </div>
      </div>
    `;
  });
}

/* ADMIN */
async function loadAdmin(){
  const res = await fetch(`${API}/projects/all`, {
    headers:{ "X-User-Id": user.user_id }
  });
  const projects = await res.json();
  const box = document.getElementById("adminProjects");
  box.innerHTML="";

  projects.forEach(p=>{
    const name = (p.project_name || "").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    const desc = (p.description || "").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    box.innerHTML += `
      <div class="project-card" data-project-id="${p.project_id}">
        <div class="project-info">
          <div class="name">${name}</div>
          <div class="desc">${desc}</div>
        </div>
        <div class="project-card-actions">
          <button type="button" class="btn btn-primary" onclick="openProject(${p.project_id})">Open</button>
          <button type="button" class="btn btn-danger" onclick="openDeleteProjectFromCard(this)">Delete</button>
        </div>
      </div>
    `;
  });
}

function openProject(pid) {
  window.location.href = `project.html?project_id=${pid}&mode=annotate`;
}

function openCurateProject(pid) {
  window.location.href = `project.html?project_id=${pid}&mode=curate`;
}


function openCreateProject(){
  document.getElementById("createProjectModal").style.display="flex";
}

function closeCreateProject(){
  document.getElementById("createProjectModal").style.display="none";
}

async function submitCreateProject(){
  const name = cp_name.value.trim();
  const desc = cp_desc.value.trim();
  const lang = (cp_lang.value || "").trim();
  const layer = cp_layer.value;

  if(!name || !layer){
    alert("Project name and layer type are required");
    return;
  }
  if(!lang){
    alert("Please select a language");
    return;
  }

  const res = await fetch(`${API}/projects`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-User-Id": user.user_id
    },
    body: JSON.stringify({
      project_name: name,
      description: desc,
      language: lang,
      layer_type: layer
    })
  });

  if(!res.ok){
    const err = await res.json();
    alert(err.detail || "Failed to create project");
    return;
  }

  closeCreateProject();
  loadAdmin();   // refresh admin project list
}

// ================= DELETE PROJECT =================//
let deleteProjectId = null;
let deleteProjectName = "";

function openDeleteProject(pid, pname){
  deleteProjectId = pid;
  deleteProjectName = pname;
  var dp = document.getElementById("dp_confirm");
  if (dp) dp.value = "";
  document.getElementById("deleteProjectModal").style.display="flex";
}

function openDeleteProjectFromCard(btn){
  var card = btn.closest(".project-card");
  if (!card) return;
  var pid = parseInt(card.getAttribute("data-project-id"), 10);
  var nameEl = card.querySelector(".project-info .name");
  var pname = nameEl ? nameEl.textContent : "";
  openDeleteProject(pid, pname);
}

function closeDeleteProject(){
  document.getElementById("deleteProjectModal").style.display="none";
  deleteProjectId = null;
}

async function confirmDeleteProject(){
  var confirmInput = document.getElementById("dp_confirm");
  if (!confirmInput || confirmInput.value.trim() !== deleteProjectName){
    alert("Project name does not match");
    return;
  }

  await fetch(`${API}/projects/${deleteProjectId}/delete`, {
    method: "DELETE",
    headers: { "X-User-Id": user.user_id }
  });

  closeDeleteProject();
  loadAdmin();
}



function logout(){
  localStorage.removeItem("user");
  location.href="login.html";
}



/* INIT */
loadAnnotate();
</script>
<!-- ================= CREATE PROJECT MODAL ================= -->
<div id="createProjectModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3>Create New Project</h3>

    <label>Project Name</label>
    <input type="text" id="cp_name" placeholder="Enter project name" />

    <label>Description</label>
    <textarea id="cp_desc" placeholder="Optional description"></textarea>

    <label>Language</label>
    <select id="cp_lang">
      <option value="">-- Select Language --</option>
      <option value="telugu">Telugu</option>
      <option value="hindi">Hindi</option>
      <option value="odia">Odia</option>
      <option value="bengali">Bengali</option>
      <option value="english">English</option>
    </select>

    <label>Layer Type</label>
    <select id="cp_layer">
      <option value="">-- Select Layer --</option>
      <option value="entity">POS</option>
      <option value="span_relation">Span-Relation</option>
      <option value="srl">Semantic Role Labeling</option>
    </select>

    <div class="modal-actions">
      <button type="button" class="btn btn-primary" onclick="submitCreateProject()">Create</button>
      <button type="button" class="btn btn-outline" onclick="closeCreateProject()">Cancel</button>
    </div>
  </div>
</div>

<!-- ================= DELETE PROJECT MODAL ================= -->
<div id="deleteProjectModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3>Delete Project</h3>

    <p style="color:var(--color-danger);">
      This will permanently delete the project, documents, and annotations.
    </p>

    <p><b>Type project name to confirm:</b></p>
    <input type="text" id="dp_confirm" />

    <div class="modal-actions">
      <button type="button" class="btn btn-danger" onclick="confirmDeleteProject()">Delete</button>
      <button type="button" class="btn btn-outline" onclick="closeDeleteProject()">Cancel</button>
    </div>
  </div>
</div>


</body>
</html>
